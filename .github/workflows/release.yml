name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            package-cmd: pnpm package
            artifact-pattern: |
              dist/*.exe
              dist/*.zip
          - os: macos-latest
            package-cmd: electron-builder --mac
            artifact-pattern: |
              dist/*.dmg
              dist/*.zip

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Update version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version
        shell: bash

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm build

      - name: Package (${{ matrix.os }})
        run: ${{ matrix.package-cmd }}

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-pattern }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
