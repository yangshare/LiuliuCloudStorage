name: CI

# 已禁用自动触发以加快 PR 合并速度
# on:
#   pull_request:
#     branches: [main]

# 如需手动触发，可以使用 workflow_dispatch
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: |
            ${{ runner.temp }}/electron-cache
            ${{ runner.temp }}/electron-builder-cache
          key: electron-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache

      - name: Run unit tests
        run: pnpm test
        continue-on-error: true

      - name: Run E2E tests
        run: pnpm test:e2e
        continue-on-error: true

      - name: Build application
        run: pnpm build
